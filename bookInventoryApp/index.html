<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Book Inventory</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");
    </style>
  </head>

  <body>
    <h1>Book Inventory</h1>
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Category</th>
          <th>Status</th>
          <th>Rate</th>
        </tr>
      </thead>
      <tbody>
        <tr class="to-read">
          <td>The lord of the rings</td>
          <td>J.R.R. Tolkein</td>
          <td>Fantasy</td>
          <td>
            <span class="status">To Read</span>
          </td>
          <td>
            <span class="rate two">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </td>
        </tr>
        <tr class="in-progress">
          <td>Los 7 habitos de la gente altamente efectiva</td>
          <td>Stephen R. Covey</td>
          <td>Self-Help</td>
          <td>
            <span class="status">In Progress</span>
          </td>
          <td>
            <span class="rate">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </td>
        </tr>
        <tr class="in-progress">
          <td>Harry Potter</td>
          <td>J.K. Rowling</td>
          <td>Fantasy</td>
          <td>
            <span class="status">In Progress</span>
          </td>
          <td>
            <span class="rate one">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </td>
        </tr>
        <tr class="read">
          <td>To Kill a Mockingbird</td>
          <td>Harper Lee</td>
          <td>Classic</td>
          <td>
            <span class="status">Read</span>
          </td>
          <td>
            <span class="rate three">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
