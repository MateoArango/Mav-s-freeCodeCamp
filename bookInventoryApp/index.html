<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Book Inventory</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <h1>Book Inventory</h1>
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Category</th>
          <th>Status</th>
          <th>Rate</th>
        </tr>
      </thead>
      <tbody>
        <tr class="to-read">
          <td>The lord of the rings</td>
          <td>J.R.R. Tolkein</td>
          <td>Fantasy</td>
          <td>
            <span class="status">To Read</span>
          </td>
          <td>
            <span class="rate">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </td>
        </tr>
        <tr class="in-progress">
          <td>Harry Potter</td>
          <td>J.K. Rowling</td>
          <td>Fantasy</td>
          <td>
            <span class="status">In Progress</span>
          </td>
          <td>
            <span class="rate">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </td>
        </tr>
        <tr class="read">
          <td>To Kill a Mockingbird</td>
          <td>Harper Lee</td>
          <td>Classic</td>
          <td>
            <span class="status">Read</span>
          </td>
          <td>
            <span class="rate one">
                <span></span>
                <span></span>
                <span></span>
            </span>
              <span class="rate two">
                <span></span>
                <span></span>
                <span></span>
              </span>
              <span class="rate three">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
