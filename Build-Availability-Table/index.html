<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Availability Table</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <main class="container">
    <body>
      <table>
        <thead>
          <tr>
            <th>&nbsp;</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
          </tr>
        </thead>
        <tbody>
          <tr class="sharp">
            <th class="time"><time datetime="9:00">9:00 AM</time></th>
            <td class="available-5"></td>
            <td class="available-5"></td>
            <td class="available-3"></td>
            <td class="available-5"></td>
            <td class="available-0"></td>
          </tr>
          <tr class="half">
            <th class="time"><time datetime="10:00">10:00 AM</time></th>
            <td class="available-3"></td>
            <td class="available-0"></td>
            <td class="available-1"></td>
            <td class="available-1"></td>
            <td class="available-5"></td>
          </tr>
          <tr class="sharp">
            <th class="time"><time datetime="11:00">11:00 AM</time></th>
            <td class="available-1"></td>
            <td class="available-3"></td>
            <td class="available-2"></td>
            <td class="available-0"></td>
            <td class="available-5"></td>
          </tr>
          <tr class="half">
            <th class="time"><time datetime="12:00">12:00 PM</time></th>
            <td class="available-4"></td>
            <td class="available-0"></td>
            <td class="available-5"></td>
            <td class="available-5"></td>
            <td class="available-2"></td>
          </tr>
          <tr class="sharp">
            <th class="time"><time datetime="13:00">1:00 PM</time></th>
            <td class="available-2"></td>
            <td class="available-4"></td>
            <td class="available-0"></td>
            <td class="available-5"></td>
            <td class="available-1"></td>
          </tr>
          <tr class="half">
            <th class="time"><time datetime="14:00">2:00 PM</time></th>
            <td class="available-0"></td>
            <td class="available-5"></td>
            <td class="available-5"></td>
            <td class="available-3"></td>
            <td class="available-2"></td>
          </tr>
          <tr class="sharp">
            <th class="time"><time datetime="15:00">3:00 PM</time></th>
            <td class="available-2"></td>
            <td class="available-4"></td>
            <td class="available-3"></td>
            <td class="available-1"></td>
            <td class="available-1"></td>
          </tr>
          <tr class="half">
            <th class="time"><time datetime="16:00">4:00 PM</time></th>
            <td class="available-1"></td>
            <td class="available-1"></td>
            <td class="available-4"></td>
            <td class="available-2"></td>
            <td class="available-5"></td>
          </tr>
        </tbody>
      </table>
      <div id="legend">
        <p class="description">Availability</p>
        <span class="left">0</span>
        <span class="right">+5</span>
        <div id="legend-gradient"></div>
      </div>
    </body>
  </main>
</html>
